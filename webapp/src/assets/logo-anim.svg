<svg xmlns="http://www.w3.org/2000/svg" viewBox="6 8 36 40" width="200" height="222" role="img" aria-label="KPITAL">
  <defs>
    <radialGradient id="lo" cx="38%" cy="24%" r="88%"><stop offset="0" stop-color="#36966F"/><stop offset="1" stop-color="#0B5641"/></radialGradient>
    <radialGradient id="hi" cx="38%" cy="24%" r="88%"><stop offset="0" stop-color="#42A77E"/><stop offset="1" stop-color="#0E6249"/></radialGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#fff" stop-opacity="0"/><stop offset="0.5" stop-color="#fff" stop-opacity="0.6"/><stop offset="1" stop-color="#fff" stop-opacity="0"/></linearGradient>
    <filter id="sh" x="-70%" y="-70%" width="240%" height="240%"><feDropShadow dx="0" dy="1.2" stdDeviation="1.15" flood-color="#04241C" flood-opacity="0.34"/></filter>
    <clipPath id="stones"><ellipse cx="24" cy="37.5" rx="12.5" ry="5"/><ellipse cx="22.5" cy="29.8" rx="10" ry="4.6"/><ellipse cx="25.5" cy="22.7" rx="8" ry="4.1"/><ellipse cx="23.5" cy="16.3" rx="5.6" ry="3.5"/></clipPath>
    <style>
      .stone{transform-box:fill-box;transform-origin:50% 92%;opacity:0;
        animation:drop .72s cubic-bezier(.45,.05,.2,1) forwards}
      .s1{animation-delay:.20s}.s2{animation-delay:.52s}.s3{animation-delay:.84s}.s4{animation-delay:1.16s}
      @keyframes drop{
        0%{opacity:0;transform:translateY(-9px) scale(1,1)}
        45%{opacity:1;transform:translateY(0) scale(1,1)}
        60%{transform:translateY(0) scale(1.09,.82)}
        78%{transform:translateY(0) scale(.96,1.06)}
        100%{opacity:1;transform:translateY(0) scale(1,1)}
      }
      .gleam{transform-box:fill-box;transform-origin:center;opacity:0;
        animation:sweep 3s cubic-bezier(.4,0,.3,1) 2s infinite}
      @keyframes sweep{
        0%{opacity:0;transform:translateX(-12px)}
        7%{opacity:1}18%{opacity:.85}
        27%{opacity:0;transform:translateX(40px)}
        100%{opacity:0;transform:translateX(40px)}
      }
      @media(prefers-reduced-motion:reduce){.stone{opacity:1;animation:none}.gleam{display:none}}
    </style>
  </defs>

  <g class="stone s1"><ellipse filter="url(#sh)" cx="24" cy="37.5" rx="12.5" ry="5" fill="url(#lo)"/></g>
  <g class="stone s2"><ellipse filter="url(#sh)" cx="22.5" cy="29.8" rx="10" ry="4.6" fill="url(#hi)"/></g>
  <g class="stone s3"><ellipse filter="url(#sh)" cx="25.5" cy="22.7" rx="8" ry="4.1" fill="url(#lo)"/></g>
  <g class="stone s4"><ellipse filter="url(#sh)" cx="23.5" cy="16.3" rx="5.6" ry="3.5" fill="url(#hi)"/></g>

  <g clip-path="url(#stones)"><g class="gleam"><rect x="6" y="8" width="11" height="40" fill="url(#sheen)" transform="skewX(-18)"/></g></g>
</svg>
